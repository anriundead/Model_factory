<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mergenetic Pro - 测试集仓库</title>
    <link rel="stylesheet" href="https://font.sec.miui.com/font/css?family=MiSans:200,300,400,500,600,700&display=swap">
    <link rel="stylesheet" href="/static/styles.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
</head>
<body>
    <header class="sticky-header">
        <div class="header-content">
            <div class="header-left-group">
                <button id="menu-btn" class="icon-btn"><i class="ri-menu-line"></i></button>
                <div class="logo">Mergenetic <span class="badge">Pro</span></div>
            </div>
            <nav><span class="status-dot"></span> <span class="status-word">测试集仓库</span></nav>
        </div>
    </header>
    <aside id="history-sidebar" class="sidebar">
        <div class="sidebar-header"><h3>工程菜单</h3> <button id="close-sidebar"><i class="ri-close-line"></i></button></div>
        <nav class="sidebar-nav">
            <a href="/" class="nav-item"><i class="ri-git-merge-line"></i><span>模型融合</span></a>
            <a href="/evaluation" class="nav-item"><i class="ri-flask-line"></i><span>模型测试</span></a>
            <a href="/testsets" class="nav-item active"><i class="ri-database-2-line"></i><span>测试集仓库</span></a>
            <a href="/test_history" class="nav-item"><i class="ri-history-line"></i><span>测试历史记录</span></a>
            <a href="/model_repo" class="nav-item"><i class="ri-archive-line"></i><span>模型仓库</span></a>
            <a href="/fusion_history" class="nav-item"><i class="ri-time-line"></i><span>融合历史</span></a>
        </nav>
        <div style="padding: 0 25px; margin-top: 10px; font-size: 0.85rem; color: #86868b;">历史记录</div>
        <div id="history-list" class="history-list"></div>
    </aside>
    <div id="sidebar-overlay" class="sidebar-overlay"></div>
    <div id="main-app" class="container active-view">
        <main>
            <div class="page-header">
                <h2>测试集仓库</h2>
                <p class="page-subtitle">管理评测用数据集，支持 HuggingFace 数据集创建与列表</p>
            </div>
            <section class="section apple-card">
                <div class="section-header">
                    <h3>测试集列表</h3>
                    <div style="display:flex; align-items:center; gap:8px;">
                        <button id="testsets-refresh" class="icon-btn" title="刷新测试集列表" style="font-size:1rem;"><i class="ri-refresh-line"></i></button>
                        <span class="helper-text">Testsets</span>
                    </div>
                </div>
                <div id="testsets-list" class="models-grid"><div class="loading-state"><div class="spinner"></div><p>加载中...</p></div></div>
            </section>
        </main>
        <footer><p>Copyright © 2025 Nine Heavens. 保留所有权利。</p></footer>
    </div>
    <!-- 测试集详情弹窗 -->
    <div id="testset-detail-overlay" class="modal-overlay" style="display:none; opacity:0;">
        <div class="ios-modal" style="max-width: 600px; max-height: 80vh; overflow-y: auto;" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3 id="testset-detail-title">测试集详情</h3>
                <p id="testset-detail-subtitle" class="limit-desc" style="margin-top: 8px;"></p>
            </div>
            <div id="testset-detail-body" style="text-align: left; padding: 0 20px 16px; font-size: 0.9rem; line-height: 1.6;">
            </div>
            <div class="modal-actions">
                <button id="testset-detail-close" class="ios-btn ios-btn-confirm">关闭</button>
            </div>
        </div>
    </div>
    <script>
        document.getElementById('menu-btn').onclick = () => { document.getElementById('history-sidebar').classList.add('open'); document.getElementById('sidebar-overlay').classList.add('show'); };
        document.getElementById('close-sidebar').onclick = () => { document.getElementById('history-sidebar').classList.remove('open'); document.getElementById('sidebar-overlay').classList.remove('show'); };
        document.getElementById('sidebar-overlay').onclick = () => { document.getElementById('history-sidebar').classList.remove('open'); document.getElementById('sidebar-overlay').classList.remove('show'); };

        var testsetsData = [];
        const TESTSETS_CACHE_KEY = 'testsets_cache_v1';
        function saveTestsetsCache(list) {
            try { sessionStorage.setItem(TESTSETS_CACHE_KEY, JSON.stringify(list || [])); } catch (e) {}
        }
        function loadTestsetsCache() {
            try {
                const raw = sessionStorage.getItem(TESTSETS_CACHE_KEY);
                return raw ? JSON.parse(raw) : null;
            } catch (e) {
                return null;
            }
        }
        function renderTestsets(list) {
            const el = document.getElementById('testsets-list');
            if (!list || list.length === 0) { el.innerHTML = '<p class="limit-desc">暂无测试集</p>'; return; }
            testsetsData = list;
            el.innerHTML = list.map((t, i) => '<div class="model-card" data-testset-index="' + i + '" style="cursor:pointer;"><div class="model-name">' + (t.name||t.hf_dataset||t.testset_id) + '</div><div class="limit-desc">' + (t.hf_dataset||'') + ' · ' + (t.sample_count||0) + ' 条</div></div>').join('');
            el.querySelectorAll('.model-card').forEach(card => {
                card.onclick = function() {
                    const idx = parseInt(card.getAttribute('data-testset-index'), 10);
                    if (testsetsData[idx] && testsetsData[idx].testset_id) showTestsetDetail(testsetsData[idx].testset_id);
                };
            });
        }
        function loadTestsets(forceRefresh) {
            const cached = !forceRefresh ? loadTestsetsCache() : null;
            if (cached && cached.length) {
                renderTestsets(cached);
                if (cached.some(t => !t.sample_count || Number(t.sample_count) <= 0)) {
                    setTimeout(() => loadTestsets(true), 0);
                }
                return;
            }
            fetch('/api/testset/list?refresh=1').then(r=>r.json()).then(d=>{
                saveTestsetsCache(d.testsets || []);
                renderTestsets(d.testsets || []);
            }).catch(() => { document.getElementById('testsets-list').innerHTML = '<p class="limit-desc">加载失败</p>'; });
        }
        function showTestsetDetail(testsetId) {
            const overlay = document.getElementById('testset-detail-overlay');
            const body = document.getElementById('testset-detail-body');
            body.innerHTML = '<div class="loading-state"><div class="spinner"></div><p>加载中...</p></div>';
            overlay.style.display = 'flex';
            setTimeout(() => { overlay.style.opacity = '1'; overlay.classList.add('show'); }, 10);
            fetch('/api/testset/' + encodeURIComponent(testsetId) + '?refresh=1').then(r => r.json()).then(d => {
                if (d.status !== 'success') { body.innerHTML = '<p class="limit-desc">加载失败</p>'; return; }
                const t = d.testset;
                const lb = d.leaderboard || [];
                document.getElementById('testset-detail-title').textContent = t.name || t.hf_dataset || '测试集';
                document.getElementById('testset-detail-subtitle').textContent = t.hf_dataset || '';
                let html = '<div style="margin-bottom: 16px;">';
                html += '<p style="margin: 0 0 8px; color: #86868b; font-size: 0.85rem;">元信息</p>';
                html += '<div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;">';
                html += '<div style="background: #f5f5f7; padding: 12px; border-radius: 10px;"><span style="color: #86868b; font-size: 0.8rem;">样本量</span><div style="font-size: 1.1rem; font-weight: 600; margin-top: 4px;">' + (t.sample_count || 0) + ' 条</div></div>';
                html += '<div style="background: #f5f5f7; padding: 12px; border-radius: 10px;"><span style="color: #86868b; font-size: 0.8rem;">Split</span><div style="font-size: 1.1rem; font-weight: 600; margin-top: 4px;">' + (t.hf_split || '-') + '</div></div>';
                if (t.hf_subset) html += '<div style="background: #f5f5f7; padding: 12px; border-radius: 10px;"><span style="color: #86868b; font-size: 0.8rem;">子集</span><div style="font-size: 1.1rem; font-weight: 600; margin-top: 4px;">' + t.hf_subset + '</div></div>';
                if (t.question_type) html += '<div style="background: #f5f5f7; padding: 12px; border-radius: 10px;"><span style="color: #86868b; font-size: 0.8rem;">题型</span><div style="font-size: 1.1rem; font-weight: 600; margin-top: 4px;">' + t.question_type + '</div></div>';
                html += '</div>';
                if (t.notes) html += '<p style="margin: 12px 0 0; color: #666; font-size: 0.85rem;"><i class="ri-sticky-note-line"></i> ' + t.notes + '</p>';
                html += '</div>';
                html += '<div style="margin-top: 20px; border-top: 1px solid #e5e5e7; padding-top: 16px;">';
                html += '<p style="margin: 0 0 12px; color: #86868b; font-size: 0.85rem;"><i class="ri-bar-chart-box-line"></i> Leaderboard（' + lb.length + ' 条记录）</p>';
                if (lb.length === 0) {
                    html += '<p style="color: #999; font-size: 0.9rem;">暂无模型在此测试集上进行过测评</p>';
                } else {
                    html += '<div style="max-height: 240px; overflow-y: auto;">';
                    html += '<table style="width: 100%; border-collapse: collapse; font-size: 0.85rem;">';
                    html += '<thead><tr style="background: #f5f5f7;"><th style="padding: 10px; text-align: left; border-radius: 8px 0 0 0;">排名</th><th style="padding: 10px; text-align: left;">模型</th><th style="padding: 10px; text-align: right; border-radius: 0 8px 0 0;">准确率</th></tr></thead>';
                    html += '<tbody>';
                    lb.forEach((item, idx) => {
                        const medal = idx === 0 ? '🥇' : (idx === 1 ? '🥈' : (idx === 2 ? '🥉' : (idx + 1)));
                        const accVal = item.accuracy != null ? Number(item.accuracy) : null;
                        const acc = accVal == null || Number.isNaN(accVal) ? '--' : accVal.toFixed(2) + '%';
                        html += '<tr style="border-bottom: 1px solid #f0f0f0;"><td style="padding: 10px;">' + medal + '</td><td style="padding: 10px;">' + (item.model_name || '-') + '</td><td style="padding: 10px; text-align: right; font-weight: 600; color: #0071e3;">' + acc + '</td></tr>';
                    });
                    html += '</tbody></table></div>';
                }
                html += '</div>';
                body.innerHTML = html;
            }).catch(() => { body.innerHTML = '<p class="limit-desc">加载失败</p>'; });
        }
        function hideTestsetDetail() {
            const overlay = document.getElementById('testset-detail-overlay');
            overlay.classList.remove('show');
            overlay.style.opacity = '0';
            setTimeout(() => { overlay.style.display = 'none'; }, 300);
        }
        document.getElementById('testset-detail-close').onclick = hideTestsetDetail;
        document.getElementById('testset-detail-overlay').onclick = function(e) { if (e.target === this) hideTestsetDetail(); };

        document.getElementById('testsets-refresh').onclick = () => {
            saveTestsetsCache([]);
            loadTestsets(true);
        };
        loadTestsets(false);
    </script>
</body>
</html>
