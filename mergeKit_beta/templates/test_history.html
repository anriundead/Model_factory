<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mergenetic Pro - 测试历史记录</title>
    <link rel="stylesheet" href="https://font.sec.miui.com/font/css?family=MiSans:200,300,400,500,600,700&display=swap">
    <link rel="stylesheet" href="/static/styles.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
</head>
<body class="page-test-history">
    <header class="sticky-header">
        <div class="header-content">
            <div class="header-left-group">
                <button id="menu-btn" class="icon-btn"><i class="ri-menu-line"></i></button>
                <div class="logo">Mergenetic <span class="badge">Pro</span></div>
            </div>
            <nav><span class="status-dot"></span> <span class="status-word">测试历史</span></nav>
        </div>
    </header>
    <aside id="history-sidebar" class="sidebar">
        <div class="sidebar-header"><h3>工程菜单</h3> <button id="close-sidebar"><i class="ri-close-line"></i></button></div>
        <nav class="sidebar-nav">
            <a href="/" class="nav-item"><i class="ri-git-merge-line"></i><span>模型融合</span></a>
            <a href="/evaluation" class="nav-item"><i class="ri-flask-line"></i><span>模型测试</span></a>
            <a href="/testsets" class="nav-item"><i class="ri-database-2-line"></i><span>测试集仓库</span></a>
            <a href="/test_history" class="nav-item active"><i class="ri-history-line"></i><span>测试历史记录</span></a>
            <a href="/model_repo" class="nav-item"><i class="ri-archive-line"></i><span>模型仓库</span></a>
            <a href="/fusion_history" class="nav-item"><i class="ri-time-line"></i><span>融合历史</span></a>
        </nav>
        <div style="padding: 0 25px; margin-top: 10px; font-size: 0.85rem; color: #86868b;">历史记录</div>
        <div id="history-list" class="history-list"></div>
    </aside>
    <div id="sidebar-overlay" class="sidebar-overlay"></div>
    <div id="main-app" class="container active-view">
        <main>
            <div class="page-header">
                <h2>测试历史记录</h2>
                <p class="page-subtitle">查看过往评测任务与结果</p>
            </div>
            <section class="section apple-card">
                <div class="section-header"><h3>历史记录</h3> <span class="helper-text">Test History</span></div>
                <div id="test-history-list"><div class="loading-state"><div class="spinner"></div><p>加载中...</p></div></div>
            </section>
        </main>
        <footer><p>Copyright © 2025 Nine Heavens. 保留所有权利。</p></footer>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('menu-btn').onclick = () => { document.getElementById('history-sidebar').classList.add('open'); document.getElementById('sidebar-overlay').classList.add('show'); };
            document.getElementById('close-sidebar').onclick = () => { document.getElementById('history-sidebar').classList.remove('open'); document.getElementById('sidebar-overlay').classList.remove('show'); };
            document.getElementById('sidebar-overlay').onclick = () => { document.getElementById('history-sidebar').classList.remove('open'); document.getElementById('sidebar-overlay').classList.remove('show'); };
            function formatPct(val) {
                if (val == null || Number.isNaN(Number(val))) return '--';
                const v = Number(val);
                return (v <= 1 ? v * 100 : v).toFixed(2) + '%';
            }
            function renderCard(h) {
                const name = h.model_name || h.custom_name || h.task_id || '';
                const dataset = h.dataset || h.hf_dataset || '评测任务';
                const status = h.status || '';
                const time = h.created_at ? new Date(h.created_at * 1000).toLocaleString() : '';
                const acc = h.metrics ? formatPct(h.metrics.accuracy) : '--';
                return `
                    <div class="history-item" data-task-id="${h.task_id || h.id || ''}">
                        <div class="h-content">
                            <div class="h-title">${name}</div>
                            <div class="h-meta">
                                <span>${time}</span>
                                <span>•</span>
                                <span>${dataset}</span>
                                ${status ? '<span>•</span><span>' + status + '</span>' : ''}
                            </div>
                        </div>
                        <div style="margin-left:auto; font-weight:600; color:#0071e3; font-size:0.85rem;">${acc}</div>
                    </div>
                `;
            }
            function showDetail(h) {
                const overlay = document.getElementById('test-history-detail-overlay');
                const body = document.getElementById('test-history-detail-body');
                const title = document.getElementById('test-history-detail-title');
                const subtitle = document.getElementById('test-history-detail-subtitle');
                title.textContent = h.model_name || h.custom_name || '评测详情';
                subtitle.textContent = h.dataset || h.hf_dataset || '';
                const metrics = h.metrics || {};
                const acc = formatPct(metrics.accuracy);
                const f1 = metrics.f1_score != null ? Number(metrics.f1_score).toFixed(4) : '--';
                const cases = metrics.test_cases != null ? metrics.test_cases : '--';
                const context = metrics.context || '--';
                let html = '<div style="margin-bottom: 16px;">';
                html += '<p style="margin: 0 0 8px; color: #86868b; font-size: 0.85rem;">评测信息</p>';
                html += '<div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;">';
                html += '<div style="background: #f5f5f7; padding: 12px; border-radius: 10px;"><span style="color: #86868b; font-size: 0.8rem;">状态</span><div style="font-size: 1rem; font-weight: 600; margin-top: 4px;">' + (h.status || '--') + '</div></div>';
                html += '<div style="background: #f5f5f7; padding: 12px; border-radius: 10px;"><span style="color: #86868b; font-size: 0.8rem;">时间</span><div style="font-size: 1rem; font-weight: 600; margin-top: 4px;">' + (h.created_at ? new Date(h.created_at * 1000).toLocaleString() : '--') + '</div></div>';
                html += '<div style="background: #f5f5f7; padding: 12px; border-radius: 10px;"><span style="color: #86868b; font-size: 0.8rem;">准确率</span><div style="font-size: 1rem; font-weight: 600; margin-top: 4px;">' + acc + '</div></div>';
                html += '<div style="background: #f5f5f7; padding: 12px; border-radius: 10px;"><span style="color: #86868b; font-size: 0.8rem;">F1</span><div style="font-size: 1rem; font-weight: 600; margin-top: 4px;">' + f1 + '</div></div>';
                html += '<div style="background: #f5f5f7; padding: 12px; border-radius: 10px;"><span style="color: #86868b; font-size: 0.8rem;">样本数</span><div style="font-size: 1rem; font-weight: 600; margin-top: 4px;">' + cases + '</div></div>';
                html += '<div style="background: #f5f5f7; padding: 12px; border-radius: 10px;"><span style="color: #86868b; font-size: 0.8rem;">上下文</span><div style="font-size: 1rem; font-weight: 600; margin-top: 4px;">' + context + '</div></div>';
                html += '</div></div>';
                body.innerHTML = html;
                overlay.style.display = 'flex';
                setTimeout(() => { overlay.style.opacity = '1'; overlay.classList.add('show'); }, 10);
            }
            function hideDetail() {
                const overlay = document.getElementById('test-history-detail-overlay');
                overlay.classList.remove('show');
                overlay.style.opacity = '0';
                setTimeout(() => { overlay.style.display = 'none'; }, 300);
            }
            document.getElementById('test-history-detail-close').onclick = hideDetail;
            document.getElementById('test-history-detail-overlay').onclick = function(e) { if (e.target === this) hideDetail(); };
            fetch('/api/test_history').then(r=>r.json()).then(d=>{
                const el = document.getElementById('test-history-list');
                if (!d.history || d.history.length === 0) { el.innerHTML = '<p class="limit-desc">暂无测试历史</p>'; return; }
                el.innerHTML = d.history.map(renderCard).join('');
                el.querySelectorAll('.history-item').forEach((item, idx) => {
                    item.onclick = () => showDetail(d.history[idx]);
                });
            }).catch(() => { document.getElementById('test-history-list').innerHTML = '<p class="limit-desc">加载失败</p>'; });
        });
    </script>
    <div id="test-history-detail-overlay" class="modal-overlay" style="display:none; opacity:0;">
        <div class="ios-modal" style="max-width: 640px; max-height: 80vh; overflow-y: auto;" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3 id="test-history-detail-title">评测详情</h3>
                <p id="test-history-detail-subtitle" class="limit-desc" style="margin-top: 8px;"></p>
            </div>
            <div id="test-history-detail-body" style="text-align: left; padding: 0 20px 16px; font-size: 0.9rem; line-height: 1.6;"></div>
            <div class="modal-actions">
                <button id="test-history-detail-close" class="ios-btn ios-btn-confirm">关闭</button>
            </div>
        </div>
    </div>
</body>
</html>
