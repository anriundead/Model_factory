<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mergenetic Pro - 模型仓库</title>
    <link rel="stylesheet" href="https://font.sec.miui.com/font/css?family=MiSans:200,300,400,500,600,700&display=swap">
    <link rel="stylesheet" href="/static/styles.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
</head>
<body>
    <header class="sticky-header">
        <div class="header-content">
            <div class="header-left-group">
                <button id="menu-btn" class="icon-btn"><i class="ri-menu-line"></i></button>
                <div class="logo">Mergenetic <span class="badge">Pro</span></div>
            </div>
            <nav><span class="status-dot"></span> <span class="status-word">模型仓库</span></nav>
        </div>
    </header>
    <aside id="history-sidebar" class="sidebar">
        <div class="sidebar-header"><h3>工程菜单</h3> <button id="close-sidebar"><i class="ri-close-line"></i></button></div>
        <nav class="sidebar-nav">
            <a href="/" class="nav-item"><i class="ri-git-merge-line"></i><span>模型融合</span></a>
            <a href="/evaluation" class="nav-item"><i class="ri-flask-line"></i><span>模型测试</span></a>
            <a href="/testsets" class="nav-item"><i class="ri-database-2-line"></i><span>测试集仓库</span></a>
            <a href="/test_history" class="nav-item"><i class="ri-history-line"></i><span>测试历史记录</span></a>
            <a href="/model_repo" class="nav-item active"><i class="ri-archive-line"></i><span>模型仓库</span></a>
        </nav>
        <div style="padding: 0 25px; margin-top: 10px; font-size: 0.85rem; color: #86868b;">历史记录</div>
        <div id="history-list" class="history-list"></div>
    </aside>
    <div id="sidebar-overlay" class="sidebar-overlay"></div>
    <div id="main-app" class="container active-view">
        <main>
            <div class="page-header">
                <h2>模型仓库</h2>
                <p class="page-subtitle">基座模型与已注册融合模型</p>
            </div>
            <section class="section apple-card">
                <div class="section-header"><h3>基座模型</h3> <span class="helper-text">Base Models</span></div>
                <p class="limit-desc" style="margin-bottom: 12px;">本地可用的基座模型，仅展示名称与关键信息。</p>
                <div id="model-repo-base" class="models-grid"><div class="loading-state"><div class="spinner"></div><p>加载中...</p></div></div>
            </section>
            <section class="section apple-card">
                <div class="section-header"><h3>融合模型</h3> <span class="helper-text">Merged Models</span></div>
                <p class="limit-desc" style="margin-bottom: 12px;">点击卡片在弹窗中查看父代、融合参数与使用数据集。</p>
                <div id="model-repo-merged" class="models-grid"><div class="loading-state"><div class="spinner"></div><p>加载中...</p></div></div>
            </section>
        </main>
        <footer><p>Copyright © 2025 Nine Heavens. 保留所有权利。</p></footer>
    </div>
    <div id="model-detail-overlay" class="modal-overlay" style="display:none; opacity:0;">
        <div class="ios-modal model-detail-modal" style="max-width: 520px;" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3 id="model-detail-title">融合模型详情</h3>
                <p id="model-detail-path" class="limit-desc" style="word-break: break-all; margin-top: 8px;"></p>
            </div>
            <div id="model-detail-body" style="text-align: left; padding: 0 20px 16px; font-size: 0.9rem; line-height: 1.5;">
            </div>
            <div class="modal-actions">
                <button id="model-detail-close" class="ios-btn ios-btn-confirm">关闭</button>
            </div>
        </div>
    </div>
    <script>
        document.getElementById('menu-btn').onclick = function() { document.getElementById('history-sidebar').classList.add('open'); document.getElementById('sidebar-overlay').classList.add('show'); };
        document.getElementById('close-sidebar').onclick = function() { document.getElementById('history-sidebar').classList.remove('open'); document.getElementById('sidebar-overlay').classList.remove('show'); };
        document.getElementById('sidebar-overlay').onclick = function() { document.getElementById('history-sidebar').classList.remove('open'); document.getElementById('sidebar-overlay').classList.remove('show'); };

        var mergedModelsData = [];
        function fmtRecipe(r) {
            if (!r) return '';
            var parts = [];
            if (r.method) parts.push('算法: ' + r.method);
            if (r.dtype) parts.push('精度: ' + r.dtype);
            if (r.weights && r.weights.length) parts.push('权重: [' + r.weights.join(', ') + ']');
            return parts.length ? parts.join('；') : '';
        }
        function fmtDataset(d) {
            if (!d) return '';
            var parts = [];
            if (d.hf_dataset) parts.push(d.hf_dataset);
            if (d.hf_subsets && d.hf_subsets.length) parts.push('子集: ' + d.hf_subsets.join(', '));
            else if (d.hf_subset) parts.push('子集: ' + d.hf_subset);
            if (d.hf_split) parts.push('split: ' + d.hf_split);
            return parts.length ? parts.join('；') : '';
        }
        function showModelDetail(index) {
            var m = mergedModelsData[index];
            if (!m) return;
            document.getElementById('model-detail-title').textContent = m.name || m.model_id || '融合模型';
            document.getElementById('model-detail-path').textContent = m.path || '';
            var html = '';
            if (m.parent_models && m.parent_models.length) {
                html += '<p style="margin: 0 0 4px; color: #86868b;">父代模型</p>';
                html += '<p style="margin: 0 0 16px;">' + m.parent_models.join('、') + '</p>';
            }
            if (m.recipe && (m.recipe.method || m.recipe.dtype || (m.recipe.weights && m.recipe.weights.length))) {
                html += '<p style="margin: 0 0 4px; color: #86868b;">融合参数</p>';
                html += '<p style="margin: 0 0 16px;">' + (fmtRecipe(m.recipe) || '—') + '</p>';
            }
            var ds = fmtDataset(m.dataset);
            html += '<p style="margin: 0 0 4px; color: #86868b;">使用数据集</p>';
            html += '<p style="margin: 0;">' + (ds || '—') + '</p>';
            document.getElementById('model-detail-body').innerHTML = html;
            var overlay = document.getElementById('model-detail-overlay');
            overlay.style.display = 'flex';
            overlay.style.opacity = '1';
            overlay.classList.add('show');
        }
        function hideModelDetail() {
            var overlay = document.getElementById('model-detail-overlay');
            overlay.classList.remove('show');
            overlay.style.opacity = '0';
            overlay.style.display = 'none';
        }
        document.getElementById('model-detail-close').onclick = hideModelDetail;
        document.getElementById('model-detail-overlay').onclick = function(e) {
            if (e.target === this) hideModelDetail();
        };

        fetch('/api/model_repo/list').then(r=>r.json()).then(d=>{
            var baseEl = document.getElementById('model-repo-base');
            var mergedEl = document.getElementById('model-repo-merged');
            function pathTail(p) { return (p || '').split('/').filter(Boolean).pop() || p || ''; }
            if (!d.base_models || d.base_models.length === 0) baseEl.innerHTML = '<p class="limit-desc">暂无基座模型</p>';
            else baseEl.innerHTML = d.base_models.map(function(m) {
                return '<div class="model-card"><div class="model-name">' + (m.name||'') + '</div><div class="limit-desc" style="font-size:0.8rem;">' + (pathTail(m.path) || '基座') + '</div></div>';
            }).join('');
            if (!d.merged_models || d.merged_models.length === 0) mergedEl.innerHTML = '<p class="limit-desc">暂无已注册融合模型</p>';
            else {
                mergedModelsData = d.merged_models;
                mergedEl.innerHTML = d.merged_models.map(function(m, i) {
                    var parentCount = (m.parent_models && m.parent_models.length) ? m.parent_models.length : 0;
                    var hint = parentCount ? parentCount + ' 个父代 · 点击查看详情' : '点击查看详情';
                    return '<div class="model-card model-card-clickable" data-merged-index="' + i + '" style="cursor:pointer;">' +
                        '<div class="model-name">' + (m.name||m.model_id) + '</div>' +
                        '<div class="limit-desc" style="font-size:0.8rem; margin-top:4px;">' + hint + '</div>' +
                        '</div>';
                }).join('');
                mergedEl.querySelectorAll('.model-card-clickable').forEach(function(card) {
                    card.onclick = function() { showModelDetail(parseInt(card.getAttribute('data-merged-index'), 10)); };
                });
            }
        }).catch(function() {
            document.getElementById('model-repo-base').innerHTML = '<p class="limit-desc">加载失败</p>';
            document.getElementById('model-repo-merged').innerHTML = '<p class="limit-desc">加载失败</p>';
        });
    </script>
</body>
</html>
